<div class="p-6 space-y-6 max-w-2xl mx-auto">
  <!-- Header -->
  <div class="flex justify-between items-center">
    <h1 class="text-3xl font-bold text-gray-900">
      {{ isEditMode ? 'Edit Category' : 'Create New Category' }}
    </h1>
    <button
      (click)="goBack()"
      class="text-gray-600 hover:text-gray-900 font-medium"
    >
      ← Back
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoadingCategory" class="flex justify-center items-center h-96">
    <div class="text-center">
      <span class="loading loading-spinner loading-lg"></span>
      <p class="text-gray-600 mt-4">Loading category...</p>
    </div>
  </div>

  <!-- Form -->
  <form *ngIf="!isLoadingCategory" [formGroup]="categoryForm" (ngSubmit)="onSubmit()" class="card bg-base-100 shadow-sm max-w-2xl mx-auto">
    <div class="card-body space-y-6">
    <!-- Name -->
    <div>
      <label class="form-control w-full">
        <div class="label">
          <span class="label-text">Category Name <span class="text-red-600">*</span></span>
        </div>
        <input
          type="text"
          formControlName="name"
          (change)="onNameChange()"
          placeholder="e.g., Electronics, Clothing, Home & Garden"
          class="input input-bordered w-full"
        />
        <div class="label" *ngIf="categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched">
          <span class="label-text-alt text-error">Name must be between 3 and 100 characters</span>
        </div>
      </label>
    </div>

    <!-- Slug -->
    <div>
      <label class="form-control w-full">
        <div class="label">
          <span class="label-text">Slug <span class="text-red-600">*</span></span>
        </div>
        <input
          type="text"
          formControlName="slug"
          placeholder="e.g., electronics, clothing, home-garden"
          class="input input-bordered w-full font-mono text-sm"
        />
        <div class="label">
          <span class="label-text-alt text-gray-500">Use lowercase letters, numbers, and hyphens only</span>
        </div>
        <div class="label" *ngIf="categoryForm.get('slug')?.invalid && categoryForm.get('slug')?.touched">
          <span class="label-text-alt text-error">Slug format is invalid</span>
        </div>
      </label>
    </div>

    <!-- Description -->
    <div>
      <label class="block text-sm font-medium text-gray-900 mb-2">Description</label>
      <textarea
        formControlName="description"
        rows="4"
        placeholder="Describe this category..."
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      ></textarea>
      <p class="text-xs text-gray-500 mt-1">
        {{ categoryForm.get('description')?.value?.length || 0 }} / 500 characters
      </p>
      <p *ngIf="categoryForm.get('description')?.invalid && categoryForm.get('description')?.touched" class="text-sm text-red-600 mt-1">
        Description must not exceed 500 characters
      </p>
    </div>

    <!-- Icon -->
    <div>
      <label class="block text-sm font-medium text-gray-900 mb-2">Category Icon</label>
      <div class="space-y-3">
        <!-- Icon Preview -->
        <div *ngIf="imagePreview" class="flex items-center space-x-4">
          <div class="w-24 h-24 bg-gray-100 rounded-lg overflow-hidden">
            <img [src]="imagePreview" alt="Preview" class="w-full h-full object-cover" />
          </div>
          <button
            type="button"
            (click)="removeImage()"
            class="px-3 py-2 bg-red-100 text-red-700 rounded hover:bg-red-200 transition font-medium text-sm"
          >
            Remove Image
          </button>
        </div>

        <!-- File Input -->
        <div *ngIf="!imagePreview" class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-blue-500 transition">
          <input
            type="file"
            accept="image/*"
            (change)="onFileSelected($event)"
            class="hidden"
            #fileInput
          />
          <button
            type="button"
            (click)="fileInput.click()"
            class="text-blue-600 hover:text-blue-700 font-medium"
          >
            Click to upload or drag and drop
          </button>
          <p class="text-xs text-gray-500 mt-1">PNG, JPG, GIF up to 5MB</p>
        </div>
      </div>
    </div>

    <!-- Is Active -->
    <div class="flex items-center space-x-3">
      <input
        type="checkbox"
        formControlName="isActive"
        id="isActive"
        class="w-4 h-4 rounded border-gray-300 focus:ring-blue-500"
      />
      <label for="isActive" class="text-sm font-medium text-gray-900">
        Active Category
      </label>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-3 pt-6 border-t">
      <button
        type="button"
        (click)="goBack()"
        class="btn btn-outline"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="categoryForm.invalid || isSubmitting"
        class="btn btn-primary"
      >
        <span *ngIf="isSubmitting" class="loading loading-spinner loading-sm"></span>
        {{ isSubmitting ? 'Saving...' : (isEditMode ? 'Update Category' : 'Create Category') }}
      </button>
    </div>
    </div>
  </form>
</div>
